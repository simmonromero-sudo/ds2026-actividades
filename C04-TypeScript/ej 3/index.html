<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Catalogo</h1>

    <!-- Formulario para agregar -->

    <h2>Agregar libro</h2>

    <input type="text" id="inTitulo" placeholder="Título">
    <input type="text" id="inAutor" placeholder="Autor">
    <input type="number" id="inPrecio" placeholder="Precio">
    <input type="text" id="inGenero" placeholder="Genero">
    <input type="checkbox" id="inDisponible"> Disponible

    <button onclick="agregar()">Agregar</button>

    <p id="error"></p>

    <hr>

    <h2>Listado</h2>

    <input type="text" id="filtroAutor" placeholder="Ingrese el autor">

    <!-- Botones -->
    <button onclick="filtrar()">filtrar</button>
    <button onclick="soloDisponibles()">Solo disponibles</button>
    <button onclick="verTodos()">Ver todos</button>


    <!-- Lista donde se muestran los libros -->
    <ul id="listado">


    </ul>

    <!-- Stats -->
    <p id="stats"></p>



    <script src="app.js"></script>
</body>
</html>
